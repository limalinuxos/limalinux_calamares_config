# --- LIMALINUX DISPLAY MANAGER CONFIGURATION ---
# Este módulo configura el gestor de inicio de sesión y el entorno de escritorio.

# Calamares recorrerá esta lista y configurará el PRIMER gestor que encuentre instalado.
# Se ha priorizado GDM para garantizar la mejor experiencia con GNOME y Wayland.
displaymanagers:
  - gdm
  - sddm
  - lightdm
  - ly
  - plasmalogin
  - cosmic-greeter
  - lxdm

# Configuración del entorno por defecto tras la instalación
# 'gnome-session' asegura que se inicie el shell de GNOME.
defaultDesktopEnvironment:
    executable: "gnome-session"
    desktopFile: "org.gnome.Shell"

# En Arch Linux, preferimos que Systemd gestione los servicios directamente.
basicSetup: false
sysconfigSetup: false

# --- Configuraciones específicas por gestor ---

# GDM (GNOME Display Manager) - Soporte nativo para Wayland
gdm:
    conf_file: "/etc/gdm/custom.conf"

# SDDM (Simple Desktop Display Manager) - Común en KDE Plasma
sddm:
    configuration_file: "/etc/sddm.conf.d/kde_settings.conf"

# LightDM - Muy versátil para XFCE, Cinnamon, etc.
lightdm:
    configuration_file: "/etc/lightdm/lightdm.conf"

# COSMIC Greeter (System76)
cosmic-greeter:
    configuration_file: "/etc/cosmic/com.system76.CosmicGreeter/v1/config"

# Ly (TUI Display Manager)
# Nota: Ly suele requerir poca configuración externa ya que se maneja como servicio.
